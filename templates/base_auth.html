<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ClinNoteRAG{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .auth-wrapper { width: 100%; max-width: 440px; }
    .auth-logo {
      text-align: center; margin-bottom: 28px;
    }
    .auth-logo a {
      font-size: 24px; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -.5px;
    }
    .auth-logo span { color: #60a5fa; }
    .auth-tagline { color: #94a3b8; font-size: 13px; margin-top: 4px; }
    .auth-card {
      background: #fff; border-radius: 14px;
      padding: 36px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .auth-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: #111827; }
    .auth-sub   { font-size: 13px; color: #6c757d; margin-bottom: 24px; }
    .auth-sub a { color: #0066cc; text-decoration: none; }
    .auth-sub a:hover { text-decoration: underline; }
    .auth-error {
      background: #fee2e2; border: 1px solid #fca5a5; border-radius: 6px;
      padding: 10px 14px; font-size: 13px; color: #991b1b; margin-bottom: 16px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px;
    }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-input {
      width: 100%; padding: 9px 12px; font-size: 14px;
      border: 1px solid #d1d5db; border-radius: 6px;
      font-family: inherit; background: #fff; transition: border-color .15s;
    }
    .form-input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,.1); }
    .field-error { font-size: 12px; color: #dc2626; margin-top: 4px; }
    .btn-auth {
      width: 100%; margin-top: 8px; padding: 11px;
      background: #0066cc; color: #fff; border: none;
      border-radius: 7px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-auth:hover { background: #0052a3; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-logo">
      <a href="/login/">Clin<span>Note</span>RAG</a>
      <div class="auth-tagline">Automated Patient Note Assessment</div>
    </div>
    <div class="auth-card">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</body>
</html>
