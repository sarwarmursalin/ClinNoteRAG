<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ClinNoteRAG{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #212529; }
    nav { background: #1a1a2e; color: #fff; padding: 0 32px; display: flex; align-items: center; gap: 24px; height: 52px; }
    nav a { color: #e0e0e0; text-decoration: none; font-size: 14px; }
    nav a:hover { color: #fff; }
    nav .brand { font-weight: 700; font-size: 17px; color: #fff; margin-right: 8px; }
    .container { max-width: 1000px; margin: 36px auto; padding: 0 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    h2 { font-size: 17px; font-weight: 600; margin: 28px 0 12px; }
    .subtitle { color: #6c757d; font-size: 14px; margin-bottom: 28px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    th { background: #f1f3f5; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid #dee2e6; }
    td { padding: 11px 14px; font-size: 14px; border-bottom: 1px solid #f1f3f5; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .badge-gray { background: #f3f4f6; color: #374151; }
    .empty { color: #9ca3af; font-style: italic; font-size: 14px; padding: 20px 0; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.07); padding: 20px; margin-bottom: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat { background: #fff; border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .stat-label { font-size: 12px; color: #6c757d; text-transform: uppercase; letter-spacing: .5px; }
    .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    code { background: #f1f3f5; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">ClinNoteRAG</a>
    <a href="/">Dashboard</a>
    <a href="/admin/">Admin</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
